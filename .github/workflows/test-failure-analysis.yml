name: Test Failure Analysis

# When CI fails, Claude analyzes the logs to determine if it's a flaky test
# or a real bug. Auto-retries flaky failures with high confidence.
#
# Adapted from: anthropics/claude-code-action/examples/test-failure-analysis.yml

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  actions: write
  pull-requests: write
  id-token: write

jobs:
  analyze-failure:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Analyze test failure
        id: analyze
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            The CI workflow failed: ${{ github.event.workflow_run.html_url }}

            Check the logs: gh run view ${{ github.event.workflow_run.id }} --log-failed

            This is a monorepo with matrix CI — each failed job corresponds to a
            specific package. Focus on the FAILED jobs only.

            Determine if this looks like a flaky test failure by checking for:
            - Timeout errors or test hangs
            - Race conditions (ordering-dependent failures)
            - Network errors or DNS resolution failures
            - Cloudflare API/binding errors in test setup
            - "Expected X but got Y" where values are timestamps, random IDs, or ordering
            - Vitest worker crashes or segfaults
            - SvelteKit sync failures unrelated to code changes

            vs. real failures:
            - Type errors in changed files
            - Assertion failures with deterministic values
            - Import/export errors
            - Missing barrel exports
            - Lint violations

            Return structured analysis.

          claude_args: >-
            --max-turns 5
            --allowedTools "Bash(gh run view:*),Bash(gh run list:*)"
            --json-schema '{"type":"object","properties":{"is_flaky":{"type":"boolean","description":"Whether this appears to be a flaky test failure"},"confidence":{"type":"number","minimum":0,"maximum":1,"description":"Confidence level in the determination"},"summary":{"type":"string","description":"One-sentence explanation of the failure"},"failed_packages":{"type":"array","items":{"type":"string"},"description":"Which packages failed"}},"required":["is_flaky","confidence","summary","failed_packages"]}'

      # Auto-retry only if flaky AND high confidence (>= 0.7)
      - name: Retry flaky tests
        if: |
          fromJSON(steps.analyze.outputs.structured_output).is_flaky == true &&
          fromJSON(steps.analyze.outputs.structured_output).confidence >= 0.7
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OUTPUT='${{ steps.analyze.outputs.structured_output }}'
          CONFIDENCE=$(echo "$OUTPUT" | jq -r '.confidence')
          SUMMARY=$(echo "$OUTPUT" | jq -r '.summary')
          PACKAGES=$(echo "$OUTPUT" | jq -r '.failed_packages | join(", ")')

          echo "Flaky test detected (confidence: $CONFIDENCE)"
          echo "Packages: $PACKAGES"
          echo "Summary: $SUMMARY"
          echo ""
          echo "Triggering automatic retry..."

          gh workflow run "CI" \
            --ref "${{ github.event.workflow_run.head_branch }}"

      # Low confidence — log but don't retry
      - name: Low confidence detection
        if: |
          fromJSON(steps.analyze.outputs.structured_output).is_flaky == true &&
          fromJSON(steps.analyze.outputs.structured_output).confidence < 0.7
        run: |
          OUTPUT='${{ steps.analyze.outputs.structured_output }}'
          CONFIDENCE=$(echo "$OUTPUT" | jq -r '.confidence')

          echo "Possible flaky test but confidence too low ($CONFIDENCE)"
          echo "Not retrying automatically — manual review recommended"

      # Comment on PR if this was a PR build
      - name: Comment on PR
        if: github.event.workflow_run.event == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OUTPUT='${{ steps.analyze.outputs.structured_output }}'
          IS_FLAKY=$(echo "$OUTPUT" | jq -r '.is_flaky')
          CONFIDENCE=$(echo "$OUTPUT" | jq -r '.confidence')
          SUMMARY=$(echo "$OUTPUT" | jq -r '.summary')
          PACKAGES=$(echo "$OUTPUT" | jq -r '.failed_packages | join(", ")')

          pr_number=$(gh pr list \
            --head "${{ github.event.workflow_run.head_branch }}" \
            --json number --jq '.[0].number')

          if [ -n "$pr_number" ]; then
            if [ "$IS_FLAKY" = "true" ]; then
              if (( $(echo "$CONFIDENCE >= 0.7" | bc -l) )); then
                ICON="🔄"
                TITLE="Flaky Test Detected"
                ACTION="Automatically retrying the workflow."
              else
                ICON="⚠️"
                TITLE="Possible Flaky Test"
                ACTION="Confidence too low for auto-retry — manual review recommended."
              fi
            else
              ICON="❌"
              TITLE="Test Failure"
              ACTION="This appears to be a real failure — manual intervention needed."
            fi

            gh pr comment "$pr_number" --body "$(cat <<EOF
          ## $ICON $TITLE

          **Analysis**: $SUMMARY
          **Confidence**: $CONFIDENCE
          **Failed packages**: $PACKAGES

          $ACTION

          [View workflow run](${{ github.event.workflow_run.html_url }})
          EOF
          )"
          fi
