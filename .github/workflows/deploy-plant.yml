name: Deploy Plant

on:
  push:
    branches: [main]
    paths:
      - "apps/plant/**"
      - "libs/engine/**"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-worker.yml
    with:
      worker-dir: apps/plant
      needs-engine: true
      run-tests: true
      run-build: true
      checkout-ref: main
    secrets: inherit
