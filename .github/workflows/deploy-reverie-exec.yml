name: Deploy Reverie Exec

on:
  push:
    branches: [main]
    paths:
      - "workers/reverie-exec/**"
      - "libs/engine/src/lib/threshold/**"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-worker.yml
    with:
      worker-dir: workers/reverie-exec
      needs-engine: true
    secrets: inherit
