name: Deploy Billing

on:
  push:
    branches: [main]
    paths:
      - "apps/billing/**"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-worker.yml
    with:
      worker-dir: apps/billing
      needs-engine: false
      run-build: true
      run-tests: true
    secrets: inherit
