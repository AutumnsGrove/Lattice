name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect which packages are affected by the changes ────────────
  detect:
    name: Detect Affected
    runs-on: ubuntu-latest
    outputs:
      affected: ${{ steps.affected.outputs.packages }}
      test-matrix: ${{ steps.affected.outputs.test_matrix }}
      typecheck-matrix: ${{ steps.affected.outputs.typecheck_matrix }}
      needs-engine: ${{ steps.affected.outputs.needs_engine }}
      has-tests: ${{ steps.affected.outputs.has_tests }}
      has-typechecks: ${{ steps.affected.outputs.has_typechecks }}
      run-all: ${{ steps.affected.outputs.run_all }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect affected packages
        id: affected
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="HEAD~1"
          fi

          RESULT=$(node .github/scripts/affected-packages.mjs "$BASE")
          echo "Full result: $RESULT"

          PACKAGES=$(echo "$RESULT" | jq -c '.affectedPackages')
          TEST_MATRIX=$(echo "$RESULT" | jq -c '.testMatrix')
          TC_MATRIX=$(echo "$RESULT" | jq -c '.typecheckMatrix')
          NEEDS_ENGINE=$(echo "$RESULT" | jq -r '.needsEngine')
          RUN_ALL=$(echo "$RESULT" | jq -r '.runAll')
          HAS_TESTS=$(echo "$RESULT" | jq -r '.testMatrix | length > 0')
          HAS_TC=$(echo "$RESULT" | jq -r '.typecheckMatrix | length > 0')

          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          echo "test_matrix=$TEST_MATRIX" >> $GITHUB_OUTPUT
          echo "typecheck_matrix=$TC_MATRIX" >> $GITHUB_OUTPUT
          echo "needs_engine=$NEEDS_ENGINE" >> $GITHUB_OUTPUT
          echo "has_tests=$HAS_TESTS" >> $GITHUB_OUTPUT
          echo "has_typechecks=$HAS_TC" >> $GITHUB_OUTPUT
          echo "run_all=$RUN_ALL" >> $GITHUB_OUTPUT

          # Summary for the Actions UI
          echo "### Affected Packages" >> $GITHUB_STEP_SUMMARY
          echo "$RESULT" | jq -r '.affectedPackages[]' | while read pkg; do
            echo "- \`$pkg\`" >> $GITHUB_STEP_SUMMARY
          done
          CHANGED=$(echo "$RESULT" | jq -r '.changedFiles')
          AFFECTED=$(echo "$RESULT" | jq -r '.affectedPackages | length')
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**$CHANGED files changed → $AFFECTED packages affected**" >> $GITHUB_STEP_SUMMARY

  # ── Run tests only for affected packages ─────────────────────────
  test:
    name: "Test: ${{ matrix.name }}"
    needs: detect
    if: needs.detect.outputs.has-tests == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.test-matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/grove-setup
        with:
          build-engine: ${{ needs.detect.outputs.needs-engine }}

      - name: Sync SvelteKit
        if: matrix.isSvelteKit
        run: pnpm exec svelte-kit sync
        working-directory: ${{ matrix.package }}

      - name: Run tests
        run: pnpm test:run
        working-directory: ${{ matrix.package }}

  # ── Type check only affected packages ────────────────────────────
  typecheck:
    name: "Check: ${{ matrix.name }}"
    needs: detect
    if: needs.detect.outputs.has-typechecks == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.typecheck-matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/grove-setup
        with:
          build-engine: ${{ needs.detect.outputs.needs-engine }}
          build-foliage: ${{ needs.detect.outputs.needs-engine }}
          build-gossamer: ${{ needs.detect.outputs.needs-engine }}

      - name: Sync SvelteKit
        if: matrix.isSvelteKit
        run: pnpm exec svelte-kit sync
        working-directory: ${{ matrix.package }}

      - name: Type check
        run: ${{ matrix.command }}
        working-directory: ${{ matrix.package }}

  # ── Barrel export verification (fast, always runs) ───────────────
  barrel-exports:
    name: Engine Barrel Exports
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify engine barrel exports
        run: ./tools/verify-engine-exports.sh

  # ── Lint (always runs, fast) ─────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/grove-setup

      - name: Run linters
        id: lint
        run: |
          pnpm lint 2>&1 | tee /tmp/lint-output.txt
        continue-on-error: true

      - name: Comment on PR with lint errors
        if: steps.lint.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/lint-output.txt', 'utf8');

            // Extract only the error/warning lines (skip the oxlint noise)
            const lines = raw.split('\n');
            const errorLines = lines.filter(l =>
              /\d+:\d+\s+(error|warning)/.test(l) || /^\s+✖/.test(l) || /^\/home/.test(l) || /Found \d+ warnings/.test(l)
            );

            // Build a focused summary
            let body = '## 🔴 Lint Failed\n\n';
            body += 'The lint check found errors that must be fixed before merging.\n\n';
            body += '```\n' + errorLines.join('\n') + '\n```\n\n';
            body += '**Full output** is in the [Lint job logs]';
            body += `(${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}).\n`;

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Lint Failed')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if lint errored
        if: steps.lint.outcome == 'failure'
        run: exit 1

      # TODO: Enable after running `pnpm format` across the full codebase
      # - name: Check formatting
      #   run: pnpm format:check

  # ── Summary gate — blocks merge if any job fails ─────────────────
  ci-pass:
    name: CI Pass
    if: always()
    needs: [detect, test, typecheck, barrel-exports, lint]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check all jobs
        id: check
        run: |
          FAILED=""
          for job in detect test typecheck barrel-exports lint; do
            case "$job" in
              detect)        RESULT="${{ needs.detect.result }}" ;;
              test)          RESULT="${{ needs.test.result }}" ;;
              typecheck)     RESULT="${{ needs.typecheck.result }}" ;;
              barrel-exports) RESULT="${{ needs.barrel-exports.result }}" ;;
              lint)          RESULT="${{ needs.lint.result }}" ;;
            esac
            echo "$job: $RESULT"
            if [ "$RESULT" = "failure" ]; then
              FAILED="$FAILED $job"
            fi
          done

          if [ -n "$FAILED" ]; then
            echo "failed_jobs=$FAILED" >> $GITHUB_OUTPUT
            echo "::error::Failed jobs:$FAILED"
            exit 1
          fi

          echo "All CI checks passed"

      - name: Comment on PR with failure summary
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const failed = '${{ steps.check.outputs.failed_jobs }}'.trim().split(/\s+/);
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            let body = '## 🔴 CI Failed\n\n';
            body += '| Job | Status |\n|-----|--------|\n';

            const jobs = ['detect', 'test', 'typecheck', 'barrel-exports', 'lint'];
            const results = {
              detect: '${{ needs.detect.result }}',
              test: '${{ needs.test.result }}',
              typecheck: '${{ needs.typecheck.result }}',
              'barrel-exports': '${{ needs.barrel-exports.result }}',
              lint: '${{ needs.lint.result }}',
            };

            for (const job of jobs) {
              const r = results[job];
              const icon = r === 'success' ? '✅' : r === 'failure' ? '❌' : r === 'skipped' ? '⏭️' : '⚪';
              body += `| ${job} | ${icon} ${r} |\n`;
            }

            body += `\n[View full run](${runUrl})\n`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('CI Failed')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
