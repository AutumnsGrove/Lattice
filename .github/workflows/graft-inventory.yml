name: Graft Inventory Check

on:
  # Run on PRs that touch migrations or feature-flags code
  pull_request:
    paths:
      - "libs/engine/migrations/*.sql"
      - "libs/engine/src/lib/feature-flags/**"
      - ".github/graft-inventory.json"
      - "docs/help-center/articles/greenhouse-features.md"

  # Run weekly on Wednesday mornings
  schedule:
    - cron: "0 9 * * 3"

  # Allow manual trigger
  workflow_dispatch:

jobs:
  check-graft-inventory:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count grafts and compare to inventory
        id: count-grafts
        shell: bash
        run: |
          #!/bin/bash
          set -e

          echo "đźŚ± Counting feature flags (grafts) in migrations..."
          echo ""

          # Read expected count from inventory
          EXPECTED_TOTAL=$(jq -r '.grafts.total' .github/graft-inventory.json)
          EXPECTED_GREENHOUSE=$(jq -r '.grafts.breakdown.greenhouse' .github/graft-inventory.json)
          EXPECTED_PLATFORM=$(jq -r '.grafts.breakdown.platform' .github/graft-inventory.json)
          LAST_UPDATED=$(jq -r '.lastUpdated' .github/graft-inventory.json)

          # Count actual INSERT statements for feature_flags in migrations
          MIGRATION_DIR="libs/engine/migrations"

          # The SQL format varies across migrations:
          #   Single-line:  INSERT OR IGNORE INTO feature_flags (id, ...) VALUES ('flag_id', ...);
          #   Multi-line:   INSERT OR IGNORE INTO feature_flags (\n  id, ...\n)\nVALUES (\n  'flag_id',
          # The awk state machine handles both: `found` flag persists across lines between
          # INSERT and VALUES, then `values` flag persists until the first quoted identifier.
          ACTUAL_TOTAL=$(awk '
            /INSERT OR IGNORE INTO feature_flags/ { found=1; next }
            found && /VALUES/ { values=1; next }
            values && /^[[:space:]]*'"'"'[a-z_]+'"'"'/ {
              gsub(/[[:space:]'"'"',]/, "")
              print
              found=0; values=0
            }
            # Reset on statement end if VALUES was never found (safety valve)
            found && /;/ && values==0 { found=0 }
          ' "$MIGRATION_DIR"/*.sql 2>/dev/null | sort -u | wc -l | tr -d ' ') || ACTUAL_TOTAL=0

          # Count greenhouse-only flags from inventory (approximation - actual check would require parsing multi-line SQL)
          ACTUAL_GREENHOUSE=$(jq -r '.flags | map(select(.greenhouseOnly == true)) | length' .github/graft-inventory.json 2>/dev/null) || ACTUAL_GREENHOUSE=0

          # Platform flags = total - greenhouse
          ACTUAL_PLATFORM=$((ACTUAL_TOTAL - ACTUAL_GREENHOUSE))

          echo "đź“Š Graft Count Results"
          echo "======================"
          echo "Expected (from inventory): $EXPECTED_TOTAL total ($EXPECTED_PLATFORM platform, $EXPECTED_GREENHOUSE greenhouse)"
          echo "Actual (from migrations):  $ACTUAL_TOTAL total ($ACTUAL_PLATFORM platform, $ACTUAL_GREENHOUSE greenhouse)"
          echo "Inventory last updated:    $LAST_UPDATED"
          echo ""

          # Calculate difference
          DIFF=$((ACTUAL_TOTAL - EXPECTED_TOTAL))

          # Determine status
          if [ "$DIFF" -eq 0 ]; then
            echo "âś… Graft count matches inventory"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "diff=0" >> $GITHUB_OUTPUT
          elif [ "$DIFF" -gt 0 ]; then
            echo "đźŚ± Found $DIFF NEW graft(s) not in inventory"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "diff=$DIFF" >> $GITHUB_OUTPUT
            echo "change_type=added" >> $GITHUB_OUTPUT
          else
            echo "âš ď¸Ź Found $((DIFF * -1)) FEWER graft(s) than inventory (possible removal)"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "diff=$DIFF" >> $GITHUB_OUTPUT
            echo "change_type=removed" >> $GITHUB_OUTPUT
          fi

          # Export values for later steps
          echo "expected=$EXPECTED_TOTAL" >> $GITHUB_OUTPUT
          echo "actual=$ACTUAL_TOTAL" >> $GITHUB_OUTPUT
          echo "expected_greenhouse=$EXPECTED_GREENHOUSE" >> $GITHUB_OUTPUT
          echo "actual_greenhouse=$ACTUAL_GREENHOUSE" >> $GITHUB_OUTPUT
          echo "last_updated=$LAST_UPDATED" >> $GITHUB_OUTPUT

      - name: Validate maturity fields in inventory
        id: check-maturity
        shell: bash
        run: |
          echo "đźŚż Checking maturity fields in graft inventory..."

          # Check that all flags have a maturity field
          MISSING_MATURITY=$(jq -r '.flags[] | select(.maturity == null) | .id' .github/graft-inventory.json)
          VALID_VALUES='["experimental","beta","stable","graduated"]'
          INVALID_MATURITY=$(jq -r --argjson valid "$VALID_VALUES" '.flags[] | select(.maturity != null) | select([.maturity] | inside($valid) | not) | "\(.id): \(.maturity)"' .github/graft-inventory.json)

          if [ -n "$MISSING_MATURITY" ]; then
            echo "âš ď¸Ź Flags missing maturity field:"
            echo "$MISSING_MATURITY"
            echo "has_maturity_issues=true" >> $GITHUB_OUTPUT
            echo "missing_maturity<<EOF" >> $GITHUB_OUTPUT
            echo "$MISSING_MATURITY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          elif [ -n "$INVALID_MATURITY" ]; then
            echo "âš ď¸Ź Flags with invalid maturity values:"
            echo "$INVALID_MATURITY"
            echo "has_maturity_issues=true" >> $GITHUB_OUTPUT
            echo "invalid_maturity<<EOF" >> $GITHUB_OUTPUT
            echo "$INVALID_MATURITY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "âś… All flags have valid maturity values"
            echo "has_maturity_issues=false" >> $GITHUB_OUTPUT
          fi

      - name: Check greenhouse article freshness
        id: check-article
        shell: bash
        run: |
          ARTICLE="docs/help-center/articles/greenhouse-features.md"

          if [ ! -f "$ARTICLE" ]; then
            echo "âš ď¸Ź Greenhouse features article not found"
            echo "article_status=missing" >> $GITHUB_OUTPUT
          else
            # Check if article lastUpdated is older than inventory lastUpdated
            ARTICLE_DATE=$(grep -m1 "^lastUpdated:" "$ARTICLE" | sed "s/lastUpdated: *['\"]*//" | sed "s/['\"].*$//")
            INVENTORY_DATE=$(jq -r '.lastUpdated' .github/graft-inventory.json)

            echo "Article lastUpdated: $ARTICLE_DATE"
            echo "Inventory lastUpdated: $INVENTORY_DATE"

            if [ "$ARTICLE_DATE" \< "$INVENTORY_DATE" ]; then
              echo "âš ď¸Ź Article is older than inventory â€” regeneration needed"
              echo "article_status=stale" >> $GITHUB_OUTPUT
            else
              echo "âś… Article is up to date with inventory"
              echo "article_status=fresh" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Find new graft definitions in PR
        if: github.event_name == 'pull_request' && steps.count-grafts.outputs.has_changes == 'true'
        id: find-new-grafts
        shell: bash
        run: |
          # Get new flag IDs from changed migration files
          # Look for added lines (starting with +) that contain flag IDs after VALUES
          NEW_GRAFTS=$(git diff origin/${{ github.base_ref }}...HEAD -- 'libs/engine/migrations/*.sql' | \
            awk '/^\+[[:space:]]*'"'"'[a-z_]+'"'"',?$/ { gsub(/[+[:space:]'"'"',]/, ""); print }' | \
            sort -u || echo "")

          if [ -n "$NEW_GRAFTS" ]; then
            echo "new_grafts<<EOF" >> $GITHUB_OUTPUT
            echo "$NEW_GRAFTS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "has_new_grafts=true" >> $GITHUB_OUTPUT
          else
            echo "has_new_grafts=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR (if grafts changed)
        if: github.event_name == 'pull_request' && (steps.count-grafts.outputs.has_changes == 'true' || steps.check-maturity.outputs.has_maturity_issues == 'true' || steps.check-article.outputs.article_status != 'fresh')
        uses: actions/github-script@v7
        env:
          EXPECTED: ${{ steps.count-grafts.outputs.expected }}
          ACTUAL: ${{ steps.count-grafts.outputs.actual }}
          DIFF: ${{ steps.count-grafts.outputs.diff }}
          CHANGE_TYPE: ${{ steps.count-grafts.outputs.change_type }}
          HAS_CHANGES: ${{ steps.count-grafts.outputs.has_changes }}
          NEW_GRAFTS: ${{ steps.find-new-grafts.outputs.new_grafts }}
          HAS_MATURITY_ISSUES: ${{ steps.check-maturity.outputs.has_maturity_issues }}
          MISSING_MATURITY: ${{ steps.check-maturity.outputs.missing_maturity }}
          INVALID_MATURITY: ${{ steps.check-maturity.outputs.invalid_maturity }}
          ARTICLE_STATUS: ${{ steps.check-article.outputs.article_status }}
        with:
          script: |
            const hasChanges = process.env.HAS_CHANGES === 'true';
            const hasMaturityIssues = process.env.HAS_MATURITY_ISSUES === 'true';
            const articleStatus = process.env.ARTICLE_STATUS;

            let body = '';

            // Graft count section
            if (hasChanges) {
              const expected = process.env.EXPECTED;
              const actual = process.env.ACTUAL;
              const diff = parseInt(process.env.DIFF);
              const changeType = process.env.CHANGE_TYPE;
              const newGrafts = process.env.NEW_GRAFTS || '';

              const emoji = changeType === 'added' ? 'đźŚ±' : 'âś‚ď¸Ź';
              const verb = changeType === 'added' ? 'added' : 'removed';
              const absDiff = Math.abs(diff);

              let newGraftsList = '';
              if (newGrafts) {
                const grafts = newGrafts.trim().split('\n').map(g => `- \`${g}\``).join('\n');
                newGraftsList = `\n\n### New Grafts Detected\n${grafts}`;
              }

              body += `## ${emoji} Graft Inventory Change Detected\n\n`;
              body += `This PR appears to have **${verb} ${absDiff} graft(s)**.\n\n`;
              body += `| Metric | Count |\n|--------|-------|\n`;
              body += `| Expected (inventory) | ${expected} |\n`;
              body += `| Actual (migrations) | ${actual} |\n`;
              body += `| Difference | ${diff > 0 ? '+' : ''}${diff} |\n`;
              body += newGraftsList + '\n\n';
            }

            // Maturity section
            if (hasMaturityIssues) {
              const missing = process.env.MISSING_MATURITY || '';
              const invalid = process.env.INVALID_MATURITY || '';

              body += `### đźŚż Maturity Field Issues\n\n`;
              if (missing) {
                const flags = missing.trim().split('\n').map(f => `- \`${f}\``).join('\n');
                body += `Flags missing \`maturity\` field in inventory:\n${flags}\n\n`;
              }
              if (invalid) {
                body += `Flags with invalid maturity values:\n\`\`\`\n${invalid}\n\`\`\`\n\n`;
              }
              body += `Valid values: \`experimental\`, \`beta\`, \`stable\`, \`graduated\`\n\n`;
            }

            // Article freshness section
            if (articleStatus === 'stale') {
              body += `### đź“„ Greenhouse Article Needs Regeneration\n\n`;
              body += `The greenhouse features article is older than the graft inventory. Please run:\n\n`;
              body += `\`\`\`bash\nbun run tools/generate-greenhouse-article.ts\n\`\`\`\n\n`;
            } else if (articleStatus === 'missing') {
              body += `### đź“„ Greenhouse Article Missing\n\n`;
              body += `No \`greenhouse-features.md\` found. Generate it:\n\n`;
              body += `\`\`\`bash\nbun run tools/generate-greenhouse-article.ts\n\`\`\`\n\n`;
            }

            // Action required section
            body += `### Action Required\n\n`;
            body += `If this PR adds new grafts, please:\n`;
            body += `1. Update \`.github/graft-inventory.json\` with the new flag(s) â€” include \`maturity\` field\n`;
            body += `2. Add the flag ID to \`KnownGraftId\` type in \`grafts.ts\`\n`;
            body += `3. Regenerate the greenhouse article: \`bun run tools/generate-greenhouse-article.ts\`\n`;
            body += `4. Apply migration to production: \`pnpm exec wrangler d1 execute grove-engine-db --remote --file=...\`\n\n`;
            body += `See \`docs/guides/adding-grafts-and-flags.md\` for the full process.\n\n`;
            body += `---\n*This check helps keep our graft documentation accurate.*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Create issue for inventory drift (scheduled run only)
        if: github.event_name == 'schedule' && steps.count-grafts.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        env:
          EXPECTED: ${{ steps.count-grafts.outputs.expected }}
          ACTUAL: ${{ steps.count-grafts.outputs.actual }}
          DIFF: ${{ steps.count-grafts.outputs.diff }}
          LAST_UPDATED: ${{ steps.count-grafts.outputs.last_updated }}
        with:
          script: |
            const expected = process.env.EXPECTED;
            const actual = process.env.ACTUAL;
            const diff = parseInt(process.env.DIFF);
            const lastUpdated = process.env.LAST_UPDATED;
            const today = new Date().toISOString().split('T')[0];

            // Check if there's already an open issue for this
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'documentation,grafts'
            });

            const hasExisting = existingIssues.data.some(issue =>
              issue.title.includes('Graft Inventory')
            );

            if (hasExisting) {
              console.log('Existing graft inventory issue found, skipping creation');
              return;
            }

            const absDiff = Math.abs(diff);
            const changeType = diff > 0 ? 'added' : 'removed';
            const emoji = diff > 0 ? 'đźŚ±' : 'âś‚ď¸Ź';

            const body = `## ${emoji} Graft Inventory Drift Detected

            The automated graft count found a **${absDiff} graft difference** since the last inventory update.

            | Metric | Value |
            |--------|-------|
            | Expected (inventory) | ${expected} |
            | Actual (migrations) | ${actual} |
            | Difference | ${diff > 0 ? '+' : ''}${diff} |
            | Inventory Last Updated | ${lastUpdated} |

            ### Action Required

            1. Review which grafts were ${changeType}
            2. Update \`.github/graft-inventory.json\` with accurate counts
            3. Ensure \`KnownGraftId\` type matches the inventory
            4. Verify production D1 has all migrations applied

            ### How to Get Current Graft List

            \`\`\`bash
            # List all flag IDs from migrations
            awk '/INSERT OR IGNORE INTO feature_flags/{f=1;next} f&&/VALUES/{v=1;next} v&&/^[[:space:]]*'"'"'[a-z_]+/{gsub(/[[:space:]'"'"',]/,"");print;f=0;v=0}' libs/engine/migrations/*.sql | sort -u

            # Query production D1
            pnpm exec wrangler d1 execute grove-engine-db --remote --command="SELECT id, name, greenhouse_only FROM feature_flags ORDER BY id;"
            \`\`\`

            ---
            *This issue was automatically created by the graft-inventory workflow.*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${emoji} Graft Inventory Update Needed - ${today}`,
              body: body,
              labels: ['documentation', 'grafts']
            });

      - name: Summary
        shell: bash
        env:
          HAS_CHANGES: ${{ steps.count-grafts.outputs.has_changes }}
          EXPECTED: ${{ steps.count-grafts.outputs.expected }}
          ACTUAL: ${{ steps.count-grafts.outputs.actual }}
          DIFF: ${{ steps.count-grafts.outputs.diff }}
          HAS_MATURITY_ISSUES: ${{ steps.check-maturity.outputs.has_maturity_issues }}
          ARTICLE_STATUS: ${{ steps.check-article.outputs.article_status }}
        run: |
          echo "## Graft Inventory Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Expected (inventory) | $EXPECTED |" >> $GITHUB_STEP_SUMMARY
          echo "| Actual (migrations) | $ACTUAL |" >> $GITHUB_STEP_SUMMARY
          echo "| Difference | $DIFF |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$HAS_CHANGES" = "true" ]; then
            echo "âš ď¸Ź **Graft count has drifted from inventory**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Update \`.github/graft-inventory.json\` to match current state." >> $GITHUB_STEP_SUMMARY
          else
            echo "âś… Graft count matches inventory" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Maturity & Article Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$HAS_MATURITY_ISSUES" = "true" ]; then
            echo "âš ď¸Ź Some flags are missing or have invalid \`maturity\` values" >> $GITHUB_STEP_SUMMARY
          else
            echo "âś… All flags have valid maturity values" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$ARTICLE_STATUS" = "fresh" ]; then
            echo "âś… Greenhouse features article is up to date" >> $GITHUB_STEP_SUMMARY
          elif [ "$ARTICLE_STATUS" = "stale" ]; then
            echo "âš ď¸Ź Greenhouse features article needs regeneration: \`bun run tools/generate-greenhouse-article.ts\`" >> $GITHUB_STEP_SUMMARY
          elif [ "$ARTICLE_STATUS" = "missing" ]; then
            echo "âš ď¸Ź Greenhouse features article is missing" >> $GITHUB_STEP_SUMMARY
          fi
