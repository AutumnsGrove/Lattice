<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Grove Census — Daily Codebase Visualization</title>
		<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
		<style>
			:root {
				--bg-deep: #1a0a2e;
				--bg: #1e1033;
				--surface: #261542;
				--grove: #16a34a;
				--meadow: #22c55e;
				--spring: #4ade80;
				--mint: #86efac;
				--scarlet: #e11d48;
				--ember: #c2410c;
				--amber: #d97706;
				--gold: #eab308;
				--honey: #facc15;
				--water-surface: #38bdf8;
				--water-deep: #0284c7;
				--cherry: #ec4899;
				--violet: #8b5cf6;
				--lavender: #c4b5fd;
				--cream: #fef3c7;
				--bone: #f5f0e8;
				--text: #e8e0f0;
				--text-muted: #a89bbe;
				--glass: rgba(255, 255, 255, 0.04);
				--glass-hover: rgba(255, 255, 255, 0.07);
				--glass-border: rgba(255, 255, 255, 0.08);
				--glass-border-hover: rgba(255, 255, 255, 0.14);
			}

			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				font-family:
					"Segoe UI",
					system-ui,
					-apple-system,
					sans-serif;
				background: var(--bg-deep);
				color: var(--text);
				line-height: 1.6;
				min-height: 100vh;
			}

			.hero {
				text-align: center;
				padding: 3rem 1rem 2rem;
				background: linear-gradient(135deg, var(--bg-deep) 0%, var(--bg) 40%, var(--surface) 100%);
				border-bottom: 1px solid var(--glass-border);
			}

			.hero h1 {
				font-size: 2.5rem;
				font-weight: 300;
				letter-spacing: 0.05em;
				margin-bottom: 0.3rem;
				background: linear-gradient(135deg, var(--grove), var(--spring), var(--meadow));
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				background-clip: text;
			}

			.hero p {
				color: var(--text-muted);
				font-size: 1.05rem;
			}
			.hero .sub {
				font-size: 0.85rem;
				color: var(--lavender);
				margin-top: 0.3rem;
				opacity: 0.7;
			}

			.stats-bar {
				display: flex;
				justify-content: center;
				gap: 1.5rem;
				padding: 1.5rem;
				flex-wrap: wrap;
			}

			.stat {
				text-align: center;
				padding: 0.8rem 1.2rem;
				background: var(--glass);
				border: 1px solid var(--glass-border);
				border-radius: 12px;
				min-width: 110px;
				transition:
					border-color 0.2s,
					background 0.2s;
			}

			.stat:hover {
				background: var(--glass-hover);
				border-color: var(--glass-border-hover);
			}
			.stat-value {
				font-size: 1.6rem;
				font-weight: 700;
			}
			.stat-label {
				font-size: 0.7rem;
				text-transform: uppercase;
				letter-spacing: 0.1em;
				color: var(--text-muted);
			}

			.dashboard {
				max-width: 1400px;
				margin: 0 auto;
				padding: 1.5rem 1rem;
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 1.5rem;
			}

			.card {
				background: var(--glass);
				border: 1px solid var(--glass-border);
				border-radius: 16px;
				padding: 1.5rem;
				transition: border-color 0.2s;
			}

			.card:hover {
				border-color: var(--glass-border-hover);
			}
			.card-full {
				grid-column: 1 / -1;
			}

			.card h2 {
				font-size: 1.05rem;
				font-weight: 500;
				margin-bottom: 0.2rem;
				color: var(--cream);
			}
			.card .sub {
				font-size: 0.78rem;
				color: var(--text-muted);
				margin-bottom: 1rem;
			}

			.chart-wrap {
				position: relative;
				width: 100%;
				height: 350px;
			}
			.chart-wrap.tall {
				height: 420px;
			}

			.insights {
				grid-column: 1 / -1;
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
				gap: 1rem;
			}

			.insight {
				background: linear-gradient(135deg, var(--glass), rgba(22, 163, 74, 0.06));
				border: 1px solid rgba(22, 163, 74, 0.15);
				border-radius: 12px;
				padding: 1rem;
			}

			.insight h3 {
				font-size: 0.88rem;
				color: var(--spring);
				margin-bottom: 0.25rem;
			}
			.insight p {
				font-size: 0.8rem;
				color: var(--text-muted);
				line-height: 1.5;
			}

			.loading {
				display: flex;
				align-items: center;
				justify-content: center;
				height: 200px;
				color: var(--text-muted);
			}

			.loading::after {
				content: "";
				width: 20px;
				height: 20px;
				border: 2px solid var(--glass-border);
				border-top-color: var(--grove);
				border-radius: 50%;
				animation: spin 0.8s linear infinite;
				margin-left: 0.8rem;
			}

			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

			.error-msg {
				grid-column: 1 / -1;
				text-align: center;
				padding: 3rem;
				color: var(--scarlet);
			}

			footer {
				text-align: center;
				padding: 2rem;
				color: var(--text-muted);
				font-size: 0.75rem;
				border-top: 1px solid var(--glass-border);
			}

			@media (max-width: 768px) {
				.dashboard {
					grid-template-columns: 1fr;
				}
				.hero h1 {
					font-size: 1.8rem;
				}
				.stats-bar {
					gap: 0.6rem;
				}
				.stat {
					min-width: 90px;
					padding: 0.6rem;
				}
				.stat-value {
					font-size: 1.2rem;
				}
			}

			@media (prefers-reduced-motion: reduce) {
				.loading::after {
					animation: none;
				}
				.stat,
				.card {
					transition: none;
				}
			}
		</style>
	</head>
	<body>
		<div class="hero">
			<h1>The Grove Census</h1>
			<p>Watching a codebase grow from a single seed</p>
			<div class="sub" id="dateRange">Loading...</div>
		</div>

		<div class="stats-bar" id="statsBar"></div>

		<div class="dashboard" id="dashboard">
			<div class="loading">Loading census data</div>
		</div>

		<footer>Grove Census — updated daily from <code>grove_census.json</code></footer>

		<script>
			const DATA_URL = "./grove_census.json";

			// ─── PALETTE ────────────────────────────────────────────────
			const P = {
				grove: "#16a34a",
				meadow: "#22c55e",
				spring: "#4ade80",
				mint: "#86efac",
				scarlet: "#e11d48",
				ember: "#c2410c",
				amber: "#d97706",
				gold: "#eab308",
				honey: "#facc15",
				waterSurface: "#38bdf8",
				waterDeep: "#0284c7",
				cherry: "#ec4899",
				violet: "#8b5cf6",
				lavender: "#c4b5fd",
				cream: "#fef3c7",
				bone: "#f5f0e8",
			};

			const catColors = {
				libs: P.meadow,
				apps: P.cherry,
				services: P.violet,
				workers: P.waterSurface,
				scripts: P.amber,
				tools: P.gold,
			};
			const codeCats = ["libs", "apps", "services", "workers", "scripts", "tools"];

			const langColors = {
				ts: P.meadow,
				svelte: P.cherry,
				js: P.amber,
				css: P.waterSurface,
				py: P.violet,
				go: P.waterDeep,
				sql: P.ember,
				sh: "#90a4ae",
				tsx: P.scarlet,
			};
			const langNames = {
				ts: "TypeScript",
				svelte: "Svelte",
				js: "JavaScript",
				css: "CSS",
				py: "Python",
				go: "Go",
				sql: "SQL",
				sh: "Shell",
				tsx: "TSX",
			};
			const langKeys = ["ts", "svelte", "js", "css", "py", "go", "sql", "sh", "tsx"];
			const LF = {
				ts: "tsLines",
				svelte: "svelteLines",
				js: "jsLines",
				css: "cssLines",
				py: "pyLines",
				go: "goLines",
				sql: "sqlLines",
				sh: "shLines",
				tsx: "tsxLines",
			};

			// ─── HELPERS ────────────────────────────────────────────────
			const fmt = (n) => n.toLocaleString();
			const fmtK = (n) => (n >= 1000 ? (n / 1000).toFixed(n >= 100000 ? 0 : 1) + "K" : String(n));
			const fmtD = (d) => {
				const [, m, day] = d.split("-");
				return (
					["", "Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"][
						+m
					] +
					" " +
					+day
				);
			};
			const fmtDF = (d) => {
				const [y, m, day] = d.split("-");
				return (
					["", "Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"][
						+m
					] +
					" " +
					+day +
					", " +
					y
				);
			};
			const days = (a, b) => Math.round((new Date(b) - new Date(a)) / 86400000);

			function sumCode(f, field) {
				return f.directories
					.filter((d) => d.depth === 0 && d.path !== "docs")
					.reduce((s, d) => s + (d[field] || 0), 0);
			}
			function codeLines(f) {
				return f.directories
					.filter((d) => d.depth === 0 && d.path !== "docs")
					.reduce((s, d) => s + d.totalLines, 0);
			}
			function docLines(f) {
				const d = f.directories.find((d) => d.depth === 0 && d.path === "docs");
				return d ? d.totalLines : 0;
			}

			function sma(arr, w = 7) {
				return arr.map((_, i) => {
					const s = Math.max(0, i - w + 1);
					const sl = arr.slice(s, i + 1);
					return sl.reduce((a, b) => a + b, 0) / sl.length;
				});
			}

			// ─── CHART DEFAULTS ─────────────────────────────────────────
			Chart.defaults.color = "#a89bbe";
			Chart.defaults.borderColor = "rgba(255,255,255,0.04)";
			Chart.defaults.font.family = "'Segoe UI', system-ui, sans-serif";

			const commonTooltip = (dates) => ({
				callbacks: {
					title: (ctx) => fmtDF(dates[ctx[0].dataIndex]),
				},
			});

			const commonX = { ticks: { maxRotation: 45, autoSkip: true, maxTicksLimit: 18 } };

			// ─── MAIN ───────────────────────────────────────────────────
			async function init() {
				let data;
				try {
					const res = await fetch(DATA_URL);
					if (!res.ok) throw new Error(`HTTP ${res.status}`);
					data = await res.json();
				} catch (err) {
					document.getElementById("dashboard").innerHTML =
						`<div class="error-msg">Failed to load: ${err.message}<br><small>Ensure grove_census.json is in the same directory.</small></div>`;
					return;
				}

				const frames = data.frames;
				if (!frames?.length) {
					document.getElementById("dashboard").innerHTML = '<div class="error-msg">No data.</div>';
					return;
				}

				const first = frames[0],
					last = frames[frames.length - 1];
				const dates = frames.map((f) => f.date);
				const labels = frames.map((f) => fmtD(f.date));
				const nDays = days(first.date, last.date);

				const codeTotals = frames.map(codeLines);
				const docTotals = frames.map(docLines);
				const firstCode = codeTotals[0],
					lastCode = codeTotals.at(-1);
				const avgPerDay = nDays > 0 ? Math.round((lastCode - firstCode) / nDays) : 0;
				const hasCommits = (last.commitCount || 0) > 0;
				const hasTests = (last.testLines || 0) > 0;

				// ─── HEADER ─────────────────────────────────────────────
				document.getElementById("dateRange").textContent =
					`${fmtDF(first.date)} to ${fmtDF(last.date)} — ${nDays} days, ${frames.length} snapshots`;

				let stats = `
    <div class="stat"><div class="stat-value" style="color:${P.meadow}">${fmtK(lastCode)}</div><div class="stat-label">Code Lines</div></div>
    <div class="stat"><div class="stat-value" style="color:${P.gold}">${firstCode > 0 ? ((lastCode / firstCode - 1) * 100).toFixed(0) : "---"}%</div><div class="stat-label">Growth</div></div>
    <div class="stat"><div class="stat-value" style="color:${P.cherry}">${fmt(avgPerDay)}</div><div class="stat-label">Lines / Day</div></div>
    <div class="stat"><div class="stat-value" style="color:${P.waterSurface}">${fmt(last.totalFiles)}</div><div class="stat-label">Files</div></div>`;
				if (hasCommits)
					stats += `<div class="stat"><div class="stat-value" style="color:${P.amber}">${fmt(last.commitCount)}</div><div class="stat-label">Commits</div></div>`;
				if (hasTests)
					stats += `<div class="stat"><div class="stat-value" style="color:${P.violet}">${fmt(last.testFiles)}</div><div class="stat-label">Test Files</div></div>`;
				stats += `<div class="stat"><div class="stat-value" style="color:${P.cream}">${fmtK(docTotals.at(-1))}</div><div class="stat-label">Doc Lines</div></div>`;
				document.getElementById("statsBar").innerHTML = stats;

				// ─── BUILD ──────────────────────────────────────────────
				const $ = document.getElementById("dashboard");
				$.innerHTML = "";

				function card(title, sub, opts = {}) {
					const el = document.createElement("div");
					el.className = "card" + (opts.full ? " card-full" : "");
					const id = opts.id || "c" + Math.random().toString(36).slice(2, 7);
					el.innerHTML = `<h2>${title}</h2><div class="sub">${sub}</div><div class="chart-wrap${opts.tall ? " tall" : ""}"><canvas id="${id}"></canvas></div>`;
					$.appendChild(el);
					return id;
				}

				// ─── INSIGHTS ─────────────────────────────────────────
				let maxJump = 0,
					maxJumpDate = "",
					maxShrink = 0,
					shrinkDate = "";
				for (let i = 1; i < frames.length; i++) {
					const d = codeTotals[i] - codeTotals[i - 1];
					if (d > maxJump) {
						maxJump = d;
						maxJumpDate = frames[i].date;
					}
					if (d < maxShrink) {
						maxShrink = d;
						shrinkDate = frames[i].date;
					}
				}

				let tsOver = null;
				for (const f of frames) {
					if (sumCode(f, "tsLines") > sumCode(f, "svelteLines") && sumCode(f, "tsLines") > 0) {
						tsOver = f.date;
						break;
					}
				}

				const lastLangs = {};
				for (const k of langKeys) lastLangs[k] = sumCode(last, LF[k]);
				const firstLangs = {};
				for (const k of langKeys) firstLangs[k] = sumCode(first, LF[k]);
				const emerged = langKeys.filter((k) => firstLangs[k] === 0 && lastLangs[k] > 0);

				const ins = [];
				if (firstCode > 0)
					ins.push({
						t: `${(lastCode / firstCode).toFixed(0)}x in ${nDays} Days`,
						p: `${fmtK(firstCode)} to ${fmtK(lastCode)} lines of code. ~${fmt(avgPerDay)} new lines every day.`,
					});
				ins.push({
					t: `Biggest Sprint: ${fmtD(maxJumpDate)}`,
					p: `+${fmt(maxJump)} lines in one day.`,
				});
				if (maxShrink < -1000)
					ins.push({
						t: `Biggest Prune: ${fmtD(shrinkDate)}`,
						p: `${fmt(Math.abs(maxShrink))} lines removed. Healthy forests need pruning.`,
					});
				if (tsOver)
					ins.push({
						t: `TS Overtook Svelte`,
						p: `${fmtDF(tsOver)}. Now: ${fmtK(lastLangs.ts)} TS vs ${fmtK(lastLangs.svelte)} Svelte.`,
					});
				if (emerged.length)
					ins.push({
						t: "New Languages",
						p:
							emerged.map((k) => `${langNames[k]} (${fmtK(lastLangs[k])})`).join(", ") +
							" appeared mid-project.",
					});

				const insEl = document.createElement("div");
				insEl.className = "insights";
				insEl.innerHTML = ins
					.map((i) => `<div class="insight"><h3>${i.t}</h3><p>${i.p}</p></div>`)
					.join("");
				$.appendChild(insEl);

				// ═════════════════════════════════════════════════════════
				// 1. CODE VS DOCS
				// ═════════════════════════════════════════════════════════
				const id1 = card("Code vs Documentation", "Two different stories, tracked separately", {
					full: true,
					tall: true,
					id: "codeVsDocs",
				});
				new Chart(document.getElementById(id1), {
					type: "line",
					data: {
						labels,
						datasets: [
							{
								label: "Code",
								data: codeTotals,
								borderColor: P.meadow,
								backgroundColor: "rgba(34,197,94,0.08)",
								fill: true,
								tension: 0.35,
								pointRadius: 1.5,
								pointHoverRadius: 5,
								borderWidth: 2,
							},
							{
								label: "Docs",
								data: docTotals,
								borderColor: P.cream,
								backgroundColor: "rgba(254,243,199,0.05)",
								fill: true,
								tension: 0.35,
								pointRadius: 1.5,
								pointHoverRadius: 5,
								borderWidth: 2,
							},
						],
					},
					options: {
						responsive: true,
						maintainAspectRatio: false,
						plugins: {
							legend: {
								position: "top",
								labels: { usePointStyle: true, pointStyle: "circle", padding: 12 },
							},
							tooltip: {
								...commonTooltip(dates),
								callbacks: {
									...commonTooltip(dates).callbacks,
									label: (ctx) => `${ctx.dataset.label}: ${fmt(ctx.parsed.y)}`,
								},
							},
						},
						scales: { y: { beginAtZero: true, ticks: { callback: (v) => fmtK(v) } }, x: commonX },
						interaction: { mode: "index", intersect: false },
					},
				});

				// ═════════════════════════════════════════════════════════
				// 2. LANGUAGE COMPOSITION
				// ═════════════════════════════════════════════════════════
				const id2 = card("Language Composition", "The language mix over time (code only)", {
					full: true,
					tall: true,
					id: "langStack",
				});
				new Chart(document.getElementById(id2), {
					type: "line",
					data: {
						labels,
						datasets: langKeys.map((k) => ({
							label: langNames[k],
							data: frames.map((f) => sumCode(f, LF[k])),
							borderColor: langColors[k],
							backgroundColor: langColors[k] + "35",
							fill: true,
							tension: 0.35,
							borderWidth: 1.5,
							pointRadius: 0,
						})),
					},
					options: {
						responsive: true,
						maintainAspectRatio: false,
						plugins: {
							legend: {
								position: "top",
								labels: {
									usePointStyle: true,
									pointStyle: "circle",
									padding: 12,
									font: { size: 11 },
								},
							},
							tooltip: {
								...commonTooltip(dates),
								callbacks: {
									...commonTooltip(dates).callbacks,
									label: (ctx) => `${ctx.dataset.label}: ${fmtK(ctx.parsed.y)}`,
								},
							},
						},
						scales: { y: { stacked: true, ticks: { callback: (v) => fmtK(v) } }, x: commonX },
						interaction: { mode: "index", intersect: false },
					},
				});

				// ═════════════════════════════════════════════════════════
				// 3. WHERE CODE LIVES
				// ═════════════════════════════════════════════════════════
				const id3 = card("Where Code Lives", "Monorepo areas over time (code only)", {
					full: true,
					tall: true,
					id: "catStack",
				});
				new Chart(document.getElementById(id3), {
					type: "line",
					data: {
						labels,
						datasets: codeCats.map((cat) => ({
							label: cat.charAt(0).toUpperCase() + cat.slice(1),
							data: frames.map((f) => {
								const d = f.directories.find((x) => x.depth === 0 && x.path === cat);
								return d ? d.totalLines : 0;
							}),
							borderColor: catColors[cat],
							backgroundColor: catColors[cat] + "30",
							fill: true,
							tension: 0.35,
							borderWidth: 1.5,
							pointRadius: 0,
						})),
					},
					options: {
						responsive: true,
						maintainAspectRatio: false,
						plugins: {
							legend: {
								position: "top",
								labels: {
									usePointStyle: true,
									pointStyle: "circle",
									padding: 12,
									font: { size: 11 },
								},
							},
							tooltip: {
								...commonTooltip(dates),
								callbacks: {
									...commonTooltip(dates).callbacks,
									label: (ctx) => `${ctx.dataset.label}: ${fmtK(ctx.parsed.y)}`,
								},
							},
						},
						scales: { y: { stacked: true, ticks: { callback: (v) => fmtK(v) } }, x: commonX },
						interaction: { mode: "index", intersect: false },
					},
				});

				// ═════════════════════════════════════════════════════════
				// 4. DAILY VELOCITY
				// ═════════════════════════════════════════════════════════
				const deltas = codeTotals.map((v, i) => (i === 0 ? 0 : v - codeTotals[i - 1]));
				const smoothed = sma(deltas);
				const id4 = card(
					"Daily Growth Velocity",
					"Lines added/removed per day, with 7-day average",
					{ full: true, id: "velocity" },
				);
				new Chart(document.getElementById(id4), {
					type: "bar",
					data: {
						labels,
						datasets: [
							{
								label: "Daily",
								data: deltas,
								backgroundColor: deltas.map((v) =>
									v >= 0 ? "rgba(34,197,94,0.5)" : "rgba(225,29,72,0.5)",
								),
								borderColor: deltas.map((v) => (v >= 0 ? P.meadow : P.scarlet)),
								borderWidth: 1,
								borderRadius: 2,
								order: 2,
							},
							{
								label: "7-Day Avg",
								data: smoothed,
								type: "line",
								borderColor: P.honey,
								backgroundColor: "transparent",
								borderWidth: 2,
								pointRadius: 0,
								tension: 0.4,
								order: 1,
							},
						],
					},
					options: {
						responsive: true,
						maintainAspectRatio: false,
						plugins: {
							legend: { position: "top", labels: { usePointStyle: true, font: { size: 11 } } },
							tooltip: {
								...commonTooltip(dates),
								callbacks: {
									...commonTooltip(dates).callbacks,
									label: (ctx) =>
										`${ctx.dataset.label}: ${ctx.parsed.y >= 0 ? "+" : ""}${fmt(Math.round(ctx.parsed.y))}`,
								},
							},
						},
						scales: {
							y: { ticks: { callback: (v) => (v >= 0 ? "+" : "") + fmtK(v) } },
							x: commonX,
						},
					},
				});

				// ═════════════════════════════════════════════════════════
				// 5. GROWTH MOMENTUM (simplified — top 3 areas per day)
				// ═════════════════════════════════════════════════════════
				// Instead of a 100% stacked area with 6 thin slivers, show a
				// simplified "where did the work go?" as a clean stacked area
				// of just the meaningful categories, smoothed for readability.
				const catDeltas = {};
				for (const cat of codeCats) {
					catDeltas[cat] = frames.map((f, i) => {
						if (i === 0) return 0;
						const curr = f.directories.find((d) => d.depth === 0 && d.path === cat);
						const prev = frames[i - 1].directories.find((d) => d.depth === 0 && d.path === cat);
						return Math.max(0, (curr ? curr.totalLines : 0) - (prev ? prev.totalLines : 0));
					});
				}
				// Smooth each category independently
				const smoothCatDeltas = {};
				for (const cat of codeCats) smoothCatDeltas[cat] = sma(catDeltas[cat], 7);

				const id5 = card(
					"Growth Momentum",
					"Where new lines are being written each day (7-day average, positive growth only)",
					{ full: true, id: "momentum" },
				);
				new Chart(document.getElementById(id5), {
					type: "line",
					data: {
						labels,
						datasets: codeCats.map((cat) => ({
							label: cat.charAt(0).toUpperCase() + cat.slice(1),
							data: smoothCatDeltas[cat],
							borderColor: catColors[cat],
							backgroundColor: catColors[cat] + "40",
							fill: true,
							tension: 0.4,
							borderWidth: 1.5,
							pointRadius: 0,
						})),
					},
					options: {
						responsive: true,
						maintainAspectRatio: false,
						plugins: {
							legend: {
								position: "top",
								labels: {
									usePointStyle: true,
									pointStyle: "circle",
									padding: 12,
									font: { size: 11 },
								},
							},
							tooltip: {
								...commonTooltip(dates),
								callbacks: {
									...commonTooltip(dates).callbacks,
									label: (ctx) =>
										`${ctx.dataset.label}: +${fmt(Math.round(ctx.parsed.y))} lines/day`,
								},
							},
						},
						scales: { y: { stacked: true, ticks: { callback: (v) => "+" + fmtK(v) } }, x: commonX },
						interaction: { mode: "index", intersect: false },
					},
				});

				// ═════════════════════════════════════════════════════════
				// 6. LANGUAGE ATTENTION (same approach — smoothed daily adds)
				// ═════════════════════════════════════════════════════════
				const langDeltas = {};
				for (const k of langKeys) {
					langDeltas[k] = frames.map((f, i) => {
						if (i === 0) return 0;
						return Math.max(0, sumCode(f, LF[k]) - sumCode(frames[i - 1], LF[k]));
					});
				}
				const smoothLangDeltas = {};
				for (const k of langKeys) smoothLangDeltas[k] = sma(langDeltas[k], 7);

				const id6 = card(
					"Language Attention",
					"Which languages are being written each day (7-day average, positive growth only)",
					{ full: true, id: "langAttention" },
				);
				new Chart(document.getElementById(id6), {
					type: "line",
					data: {
						labels,
						datasets: langKeys.map((k) => ({
							label: langNames[k],
							data: smoothLangDeltas[k],
							borderColor: langColors[k],
							backgroundColor: langColors[k] + "35",
							fill: true,
							tension: 0.4,
							borderWidth: 1.5,
							pointRadius: 0,
						})),
					},
					options: {
						responsive: true,
						maintainAspectRatio: false,
						plugins: {
							legend: {
								position: "top",
								labels: {
									usePointStyle: true,
									pointStyle: "circle",
									padding: 12,
									font: { size: 11 },
								},
							},
							tooltip: {
								...commonTooltip(dates),
								callbacks: {
									...commonTooltip(dates).callbacks,
									label: (ctx) =>
										`${ctx.dataset.label}: +${fmt(Math.round(ctx.parsed.y))} lines/day`,
								},
							},
						},
						scales: { y: { stacked: true, ticks: { callback: (v) => "+" + fmtK(v) } }, x: commonX },
						interaction: { mode: "index", intersect: false },
					},
				});

				// ═════════════════════════════════════════════════════════
				// 7 & 8. PIES
				// ═════════════════════════════════════════════════════════
				const pieId = card("Current Language Mix", fmtDF(last.date), { id: "langPie" });
				const pf = langKeys
					.map((k) => ({ n: langNames[k], v: lastLangs[k], c: langColors[k] }))
					.filter((x) => x.v > 0);
				const pt = pf.reduce((a, b) => a + b.v, 0);
				new Chart(document.getElementById(pieId), {
					type: "doughnut",
					data: {
						labels: pf.map((x) => x.n),
						datasets: [
							{
								data: pf.map((x) => x.v),
								backgroundColor: pf.map((x) => x.c),
								borderColor: "rgba(0,0,0,0.3)",
								borderWidth: 1,
							},
						],
					},
					options: {
						responsive: true,
						maintainAspectRatio: false,
						plugins: {
							legend: {
								position: "right",
								labels: { usePointStyle: true, font: { size: 11 }, padding: 6 },
							},
							tooltip: {
								callbacks: {
									label: (ctx) =>
										`${ctx.label}: ${fmtK(ctx.parsed)} (${((ctx.parsed / pt) * 100).toFixed(1)}%)`,
								},
							},
						},
					},
				});

				const catPieId = card("Where Code Lives", fmtDF(last.date), { id: "catPie" });
				const cd = frames
					.at(-1)
					.directories.filter((d) => d.depth === 0 && d.path !== "docs" && d.totalLines > 0)
					.sort((a, b) => b.totalLines - a.totalLines);
				const ct = cd.reduce((a, b) => a + b.totalLines, 0);
				new Chart(document.getElementById(catPieId), {
					type: "doughnut",
					data: {
						labels: cd.map((d) => d.path.charAt(0).toUpperCase() + d.path.slice(1)),
						datasets: [
							{
								data: cd.map((d) => d.totalLines),
								backgroundColor: cd.map((d) => catColors[d.path] || P.bone),
								borderColor: "rgba(0,0,0,0.3)",
								borderWidth: 1,
							},
						],
					},
					options: {
						responsive: true,
						maintainAspectRatio: false,
						plugins: {
							legend: {
								position: "right",
								labels: { usePointStyle: true, font: { size: 11 }, padding: 6 },
							},
							tooltip: {
								callbacks: {
									label: (ctx) =>
										`${ctx.label}: ${fmtK(ctx.parsed)} (${((ctx.parsed / ct) * 100).toFixed(1)}%)`,
								},
							},
						},
					},
				});

				// ═════════════════════════════════════════════════════════
				// 9 & 10. COMMITS PER DAY + TEST GROWTH
				// ═════════════════════════════════════════════════════════
				if (hasCommits) {
					const commitData = frames.map((f) => f.commitCount || 0);
					const commitDeltas = commitData.map((v, i) => (i === 0 ? 0 : v - commitData[i - 1]));
					const id_c = card("Commits Per Day", "The daily heartbeat", { id: "cpd" });
					new Chart(document.getElementById(id_c), {
						type: "bar",
						data: {
							labels,
							datasets: [
								{
									label: "Commits",
									data: commitDeltas,
									backgroundColor: "rgba(217,119,6,0.5)",
									borderColor: P.amber,
									borderWidth: 1,
									borderRadius: 2,
									order: 2,
								},
								{
									label: "7-Day Avg",
									data: sma(commitDeltas),
									type: "line",
									borderColor: P.honey,
									backgroundColor: "transparent",
									borderWidth: 2,
									pointRadius: 0,
									tension: 0.4,
									order: 1,
								},
							],
						},
						options: {
							responsive: true,
							maintainAspectRatio: false,
							plugins: {
								legend: { position: "top", labels: { usePointStyle: true, font: { size: 11 } } },
								tooltip: {
									...commonTooltip(dates),
									callbacks: {
										...commonTooltip(dates).callbacks,
										label: (ctx) => `${ctx.dataset.label}: ${fmt(Math.round(ctx.parsed.y))}`,
									},
								},
							},
							scales: { x: commonX },
						},
					});
				}

				if (hasTests) {
					const testData = frames.map((f) => f.testLines || 0);
					const id_t = card("Test Growth vs Code", "Are tests keeping pace?", { id: "testGrowth" });
					new Chart(document.getElementById(id_t), {
						type: "line",
						data: {
							labels,
							datasets: [
								{
									label: "Code",
									data: codeTotals,
									borderColor: P.meadow,
									backgroundColor: "transparent",
									tension: 0.35,
									pointRadius: 0,
									borderWidth: 2,
									yAxisID: "y",
								},
								{
									label: "Tests",
									data: testData,
									borderColor: P.cherry,
									backgroundColor: "rgba(236,72,153,0.06)",
									fill: true,
									tension: 0.35,
									pointRadius: 0,
									borderWidth: 2,
									yAxisID: "y",
								},
							],
						},
						options: {
							responsive: true,
							maintainAspectRatio: false,
							plugins: {
								legend: { position: "top", labels: { usePointStyle: true, font: { size: 11 } } },
								tooltip: {
									...commonTooltip(dates),
									callbacks: {
										...commonTooltip(dates).callbacks,
										label: (ctx) => `${ctx.dataset.label}: ${fmtK(ctx.parsed.y)}`,
									},
								},
							},
							scales: { y: { ticks: { callback: (v) => fmtK(v) } }, x: commonX },
							interaction: { mode: "index", intersect: false },
						},
					});
				}
			}

			init();
		</script>
	</body>
</html>
