<!doctype html>
<html lang="en" class="dark">
	<head>
		<!-- Inline critical colors — dark by default to prevent any flash.
         These match the Grove design system values in app.css exactly. -->
		<style>
			html,
			body {
				margin: 0;
				background-color: #171a1e;
				color: #f5f2ea;
				color-scheme: dark;
			}
			html:not(.dark),
			html:not(.dark) body {
				background-color: #fefdfb;
				color: #3d2914;
				color-scheme: light;
			}
		</style>
		<!-- Blocking script: only acts if user has explicitly chosen light mode -->
		<script>
			try {
				var stored = localStorage.getItem("grove-theme");
				if (stored === "light") {
					document.documentElement.classList.remove("dark");
				}
			} catch (e) {}
		</script>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Grove: a place to Be. Coming soon." />
		<meta name="theme-color" content="#16a34a" />
		<!-- Prevent Dark Reader from interfering with Grove's native dark mode -->
		<meta name="darkreader-lock" />

		<!-- Favicons -->
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />

		<!-- Apple Touch Icon (iOS home screen, iMessage previews) -->
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />

		<!-- Safari Pinned Tab -->
		<link rel="mask-icon" href="%sveltekit.assets%/safari-pinned-tab.svg" color="#16a34a" />

		<!-- PWA Manifest -->
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />

		<!-- Windows -->
		<meta name="msapplication-TileColor" content="#0f172a" />
		<meta name="msapplication-config" content="none" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<!-- Grove Entrance — warm loading overlay before SvelteKit hydrates.
         Pure HTML+CSS so it paints on first frame, no JS required.
         Dismissed by root +layout.svelte onMount (see grove-entrance-dismiss). -->
		<div id="grove-entrance" aria-hidden="true">
			<div class="ge-backdrop"></div>
			<div class="ge-content">
				<div class="ge-breathe">
					<svg
						xmlns="http://www.w3.org/2000/svg"
						viewBox="0 0 100 100"
						width="64"
						height="64"
						role="img"
						aria-label="Grove logo"
					>
						<g transform="rotate(-12 50 50)">
							<path fill="#15803d" d="M50 5 L18 32 L50 18 Z" />
							<path fill="#86efac" d="M50 5 L50 18 L82 32 Z" />
							<path fill="#166534" d="M50 20 L12 50 L50 35 Z" />
							<path fill="#4ade80" d="M50 20 L50 35 L88 50 Z" />
							<path fill="#14532d" d="M50 38 L18 68 L50 54 Z" />
							<path fill="#22c55e" d="M50 38 L50 54 L82 68 Z" />
							<path fill="#3d2914" d="M50 54 L42 58 L46 100 L50 100 Z" />
							<path fill="#5a3f30" d="M50 54 L58 58 L54 100 L50 100 Z" />
						</g>
					</svg>
				</div>
				<p class="ge-label">Entering the grove&hellip;</p>
			</div>
			<div class="ge-motes">
				<div
					class="ge-mote"
					style="--m-d: 0s; --m-x: 22%; --m-dr: -12px; --m-s: 3px; --m-t: 2.8s"
				></div>
				<div
					class="ge-mote"
					style="--m-d: 0.5s; --m-x: 45%; --m-dr: 15px; --m-s: 2px; --m-t: 3.2s"
				></div>
				<div
					class="ge-mote"
					style="--m-d: 1.1s; --m-x: 68%; --m-dr: -8px; --m-s: 2px; --m-t: 2.5s"
				></div>
				<div
					class="ge-mote"
					style="--m-d: 1.6s; --m-x: 35%; --m-dr: 18px; --m-s: 3px; --m-t: 3s"
				></div>
				<div
					class="ge-mote"
					style="--m-d: 2s; --m-x: 78%; --m-dr: -15px; --m-s: 2px; --m-t: 2.6s"
				></div>
			</div>
		</div>
		<style>
			#grove-entrance {
				position: fixed;
				inset: 0;
				z-index: 100000;
				display: flex;
				align-items: center;
				justify-content: center;
				transition: opacity 0.4s ease-out;
				pointer-events: none;
			}
			#grove-entrance.ge-hidden {
				opacity: 0;
			}
			.ge-backdrop {
				position: absolute;
				inset: 0;
				background: rgba(59, 36, 20, 0.78);
				backdrop-filter: blur(12px);
				-webkit-backdrop-filter: blur(12px);
				animation: ge-fade-in 0.3s ease-out forwards;
			}
			.dark .ge-backdrop {
				background: rgba(10, 10, 10, 0.85);
			}
			.ge-content {
				position: relative;
				z-index: 1;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 20px;
			}
			.ge-breathe {
				animation: ge-breathe 2s ease-in-out 0.2s infinite;
			}
			.ge-label {
				color: rgba(255, 255, 255, 0.9);
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
				font-size: 1rem;
				font-weight: 500;
				letter-spacing: 0.025em;
				margin: 0;
				animation: ge-label-in 0.4s ease-out 0.2s both;
			}
			.ge-motes {
				position: absolute;
				inset: 0;
				overflow: hidden;
				pointer-events: none;
			}
			.ge-mote {
				position: absolute;
				bottom: 35%;
				left: var(--m-x);
				width: var(--m-s);
				height: var(--m-s);
				border-radius: 50%;
				background: rgba(255, 255, 255, 0.5);
				box-shadow: 0 0 4px rgba(255, 255, 255, 0.3);
				animation: ge-float var(--m-t) ease-in-out var(--m-d) infinite;
			}
			@keyframes ge-fade-in {
				from {
					opacity: 0;
				}
				to {
					opacity: 1;
				}
			}
			@keyframes ge-breathe {
				0%,
				100% {
					transform: scale(1);
					opacity: 0.85;
				}
				50% {
					transform: scale(1.08);
					opacity: 1;
				}
			}
			@keyframes ge-label-in {
				from {
					opacity: 0;
					transform: translateY(8px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}
			@keyframes ge-float {
				0% {
					transform: translateY(0) translateX(0);
					opacity: 0;
				}
				15% {
					opacity: 0.7;
				}
				80% {
					opacity: 0.35;
				}
				100% {
					transform: translateY(-130px) translateX(var(--m-dr));
					opacity: 0;
				}
			}
			@media (prefers-reduced-motion: reduce) {
				.ge-breathe {
					animation: none;
					opacity: 1;
				}
				.ge-mote {
					display: none;
				}
				.ge-backdrop {
					animation: none;
					opacity: 1;
				}
				.ge-label {
					animation: none;
					opacity: 1;
					transform: none;
				}
			}
		</style>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
