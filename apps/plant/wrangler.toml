# Grove Plant - Onboarding & Signup UI
# Deployed to: plant.grove.place
#
# Workers deployment with Smart Placement for lower D1 latency.
# Handles new-wanderer signup, Turnstile verification, and OAuth flow.

name = "grove-plant"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Worker entry point (SvelteKit adapter-cloudflare output)
main = ".svelte-kit/cloudflare/_worker.js"

# Static assets served alongside the Worker
[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

# Smart Placement — run closer to back-end services (D1) for lower latency
[placement]
mode = "smart"

# Observability — structured logs in Cloudflare dashboard
[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

# Environment variables
[vars]
# Turnstile (Shade) - human verification
TURNSTILE_SITE_KEY = "0x4AAAAAACI9p49O_VFDy3WA"
ZEPHYR_URL = "https://grove-zephyr.m7jv4v7npb.workers.dev"

# GroveAuth (Heartwood) - public OAuth client config
GROVEAUTH_URL = "https://login.grove.place"
GROVEAUTH_CLIENT_ID = "grove-plant"

# Signup gate - set to "true" to allow new wanderer registration
SIGNUPS_ENABLED = "true"

# D1 Database binding (same as landing/engine - shared database)
[[d1_databases]]
binding = "DB"
database_name = "grove-engine-db"
database_id = "a6394da2-b7a6-48ce-b7fe-b1eb3e730e68"

# GroveAuth Service Binding (Heartwood - fast session validation)
[[services]]
binding = "AUTH"
service = "groveauth"

# Zephyr Service Binding (email gateway - direct internal routing)
[[services]]
binding = "ZEPHYR"
service = "grove-zephyr"

# KV Namespace - For rate limiting (email verification, etc.)
# Create with: npx wrangler kv:namespace create KV
# Then add the ID below
[[kv_namespaces]]
binding = "KV"
id = "3d3c7bcadf2a49d2ab46aa507d437f2f"

# Secrets (deploy via `gw secret apply --write --worker grove-plant`):
# - GROVEAUTH_CLIENT_SECRET
# - TURNSTILE_SECRET_KEY
# - ZEPHYR_API_KEY
