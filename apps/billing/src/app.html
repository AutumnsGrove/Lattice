<!doctype html>
<html lang="en">
	<head>
		<script nonce="%sveltekit.nonce%">
			try {
				const stored = localStorage.getItem("grove-theme");
				if (stored === "dark" || !stored) {
					document.documentElement.classList.add("dark");
				}
			} catch (e) {
				document.documentElement.classList.add("dark");
			}
		</script>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="Manage your Grove subscription — billing, plans, and payments."
		/>
		<meta name="theme-color" content="#16a34a" />
		<meta name="darkreader-lock" />

		<!-- Preconnect to CDN for faster font loading -->
		<link rel="preconnect" href="https://cdn.grove.place" crossorigin />
		<link rel="dns-prefetch" href="https://cdn.grove.place" />

		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="mask-icon" href="%sveltekit.assets%/safari-pinned-tab.svg" color="#16a34a" />

		<meta property="og:title" content="Billing - Grove" />
		<meta property="og:description" content="Manage your Grove subscription and billing." />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://billing.grove.place" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
