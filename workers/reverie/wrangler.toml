# Grove Reverie — Natural Language Configuration
# Translates feelings into coordinated API calls across 32 domains.
# "Make my site feel like a midnight library" → theme, fonts, colors, ambient sounds.
#
# Callers authenticate via Heartwood tokens (AUTH service binding).
# LLM inference delegated to Lumen via service binding.

name = "grove-reverie"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# =============================================================================
# D1 Database — Engine DB for interaction history + settings reads
# =============================================================================
[[d1_databases]]
binding = "DB"
database_name = "grove-engine-db"
database_id = "a6394da2-b7a6-48ce-b7fe-b1eb3e730e68"

# =============================================================================
# D1 Database — Curios DB for curio widget config reads
# =============================================================================
[[d1_databases]]
binding = "CURIO_DB"
database_name = "grove-curios-db"
database_id = "b03756ad-30d7-427a-9a1b-ec2f6478fcbd"

# =============================================================================
# Durable Objects — Threshold rate limiting (per-tenant isolation)
# =============================================================================
[[durable_objects.bindings]]
name = "THRESHOLD"
class_name = "ThresholdDO"
script_name = "grove-durable-objects"

# =============================================================================
# Service Bindings — Internal worker-to-worker communication
# =============================================================================
[[services]]
binding = "LUMEN"
service = "grove-lumen"

[[services]]
binding = "AUTH"
service = "grove-auth"

[[services]]
binding = "REVERIE_EXEC"
service = "grove-reverie-exec"

# =============================================================================
# Secrets (configured via: gw secret apply <name> --worker grove-reverie)
# =============================================================================
# REVERIE_API_KEY       - API key for authenticating callers to this worker
# LUMEN_API_KEY         - API key for calling the Lumen worker
# EXEC_API_KEY          - API key for authenticating to the execution worker
