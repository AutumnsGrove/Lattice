<!doctype html>
<html lang="en">
	<head>
		<script>
			try {
				// Glimpse injects via 'theme' key; fall back to 'grove-theme' for
				// manual browser sessions. Default to light (no class = light mode).
				const stored = localStorage.getItem('theme') || localStorage.getItem('grove-theme');
				if (stored === 'dark') {
					document.documentElement.classList.add('dark');
				}
			} catch (e) {
				// Storage unavailable — leave as light (browser default)
			}
		</script>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="darkreader-lock" />
		<title>Showroom — Grove</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
